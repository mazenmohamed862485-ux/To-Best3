workflows:
  android-release:
    name: TO Best — Android Release (APK + AAB)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.22.3
      java:    17
      groups:
        - tobest_signing       # CM group containing keystore env vars
      vars:
        PACKAGE_NAME:  "com.tobest.app"
        FLUTTER_BUILD: "release"

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $CM_BUILD_DIR/.dart_tool

    triggering:
      events:
        - push
      branch_patterns:
        - pattern:    main
          include:    true
          source:     true

    scripts:
      # 1. Decode keystore from base64 env var
      - name: Decode keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/release.keystore

      # 2. Create key.properties
      - name: Create key.properties
        script: |
          cat > "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/release.keystore
          EOF

      # 3. Flutter pub get
      - name: Install dependencies
        script: flutter pub get

      # 4. Run gen-l10n
      - name: Generate localizations
        script: flutter gen-l10n

      # 5. Build APK
      - name: Build APK
        script: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --build-name=8.2.0 \
            --build-number=$(($(date +%s)/1000))

      # 6. Build AAB
      - name: Build AAB
        script: |
          flutter build appbundle \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --build-name=8.2.0 \
            --build-number=$(($(date +%s)/1000))

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - build/debug-info/**
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - dev@tobest.app
        notify:
          success: true
          failure: true

  # ── Debug build (for internal testing) ───────────────────
  android-debug:
    name: TO Best — Android Debug
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: 3.22.3
      java:    17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern:    develop
          include:    true

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Generate localizations
        script: flutter gen-l10n

      - name: Build debug APK
        script: flutter build apk --debug

    artifacts:
      - build/**/outputs/**/*.apk
