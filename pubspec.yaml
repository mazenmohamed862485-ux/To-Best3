name: to_best
description: TO Best — Professional Training & Nutrition System (MAZEN COACH v8.2 → Flutter)
publish_to: none
version: 8.2.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # HTTP & API
  dio: ^5.4.3

  # Local Cache (SQLite)
  sqflite: ^2.3.3
  path: ^1.9.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Shared Preferences (light settings)
  shared_preferences: ^2.3.2

  # Localization
  intl: ^0.19.0

  # Charts (Progress screen)
  fl_chart: ^0.68.0

  # WebView (Google Drive videos)
  webview_flutter: ^4.9.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Connectivity
  connectivity_plus: ^6.0.5

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Utils
  equatable: ^2.0.5
  url_launcher: ^6.3.1
  share_plus: ^10.0.2
  package_info_plus: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  generate: true
